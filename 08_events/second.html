<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>chai aur code</h1>
    <button id="stop">stop</button>
</body>
<script>
    const sayyash = function(){
        console.log("yash");
    }
    setTimeout(sayyash,2000) //this is only one time as it is a settimeout 

    const changetext = function(){
        document.querySelector('h1').innerHTML = 'yash is a good boy'
    }
    const changeMe  = setTimeout(changetext,2000)

    document.querySelector('#stop').addEventListener('click' ,function (){
      clearTimeout(changeMe)//ye rok deta hai settimeout ko kuch bhi karne se
      console.log("stpped")
    })
</script>
</html>
